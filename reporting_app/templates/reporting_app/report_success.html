{% extends "base.html" %}

{% block content %}
<div class="container mx-auto p-4 flex justify-center items-center h-full">
    <div class="bg-white p-8 rounded-xl shadow-2xl text-center max-w-sm w-full border border-green-200">
        <!-- Success Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-green-600 mx-auto mb-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
        </svg>

        <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Report Submitted!</h1>
        <p class="text-md text-gray-600 mb-6">
            Your weekly report (ID: **#{{ report_pk }}**) has been successfully finalized.
        </p>

        <!-- Redirect Button -->
        <a href="{% url 'supervisor_home' %}" 
           class="w-full inline-block px-6 py-3 text-lg font-semibold rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 shadow-xl transition duration-300 transform hover:scale-105">
            Go to Dashboard
        </a>
    </div>
</div>
{% endblock content %}
